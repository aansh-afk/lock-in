<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>The Wheel | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(17, 17, 17, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.72);
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        background: #fad399;
        color: #000;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline for now</h1>
      <p>
        The Wheel could not load the latest app shell from cache yet. Reconnect once to refresh the app,
        then it will stay available offline.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
